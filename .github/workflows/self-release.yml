name: self-release

on:
  push:
    tags:
      - "self-v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            libssl-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            perl \
            pkg-config

      - name: Build
        shell: bash
        env:
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          CARGO_PROFILE_RELEASE_LTO: "false"
        run: |
          set -euo pipefail
          cargo build \
            --manifest-path codex-rs/Cargo.toml \
            -p codex-cli \
            --bin codex \
            --jobs 1 \
            --release \
            --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          name="codex-${tag}-${target}"
          mkdir -p dist
          tar -C "codex-rs/target/${target}/release" -czf "dist/${name}.tar.gz" codex

          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sha256sum "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"
          else
            shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
